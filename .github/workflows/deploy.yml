name: Build and Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      - run: pnpm install
      
      - run: pnpm --filter @workspace/green-campus run build
        env:
          PORT: 3000
          BASE_PATH: /green_campus/
      
      - name: Debug - Check build output
        if: always()
        run: |
          echo "=== Checking artifacts/green-campus directory ==="
          ls -la artifacts/green-campus/ || echo "Directory not found"
          echo ""
          echo "=== Checking artifacts/green-campus/dist directory ==="
          ls -la artifacts/green-campus/dist/ || echo "dist not found"
          echo ""
          echo "=== Checking artifacts/green-campus/dist/public directory ==="
          ls -la artifacts/green-campus/dist/public/ || echo "dist/public not found"
          echo ""
          echo "=== Full tree of artifacts/green-campus ==="
          find artifacts/green-campus -type f | head -20
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build
          path: artifacts/green-campus/dist/public
          if-no-files-found: warn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: public
      
      - name: Deploy
        run: |
          echo "=== Contents of current directory ==="
          ls -la
          echo ""
          echo "=== Contents of public directory ==="
          ls -la public/ 2>/dev/null || echo "public directory not found"
          echo ""
          echo "=== Find all files in public ==="
          find public -type f 2>/dev/null | head -20 || echo "No files found"
          echo ""
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages
          rm -rf * .nojekyll .gitignore
          
          # Copy everything from public, including hidden files
          if [ -d "public" ]; then
            cp -r public/. .
            echo "Deployment completed"
          else
            echo "Error: public directory not found"
            exit 1
          fi
          
          git add -A
          git commit -m "Deploy ${{ github.sha }}" || true
          git push origin gh-pages
