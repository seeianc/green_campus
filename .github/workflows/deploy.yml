name: Build and Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      - run: pnpm install
      
      - run: pnpm --filter @workspace/green-campus run build
        env:
          PORT: 3000
          BASE_PATH: /green_campus/
          VITE_GIST_PAT: ${{ secrets.VITE_GIST_PAT }}
      
      - name: Debug - Check build output
        if: always()
        run: |
          echo "=== Checking artifacts/green-campus directory ==="
          ls -la artifacts/green-campus/ || echo "Directory not found"
          echo ""
          echo "=== Checking artifacts/green-campus/dist directory ==="
          ls -la artifacts/green-campus/dist/ || echo "dist not found"
          echo ""
          echo "=== Checking artifacts/green-campus/dist/public directory ==="
          ls -la artifacts/green-campus/dist/public/ || echo "dist/public not found"
          echo ""
          echo "=== Full tree of artifacts/green-campus ==="
          find artifacts/green-campus -type f | head -20
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build
          path: artifacts/green-campus/dist/public
          if-no-files-found: warn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: public
      
      - name: Deploy
        run: |
          echo "=== Contents of current directory before operations ==="
          ls -la public/ | head -10
          echo ""
          
          # Copy files to temp location before switching branches
          mkdir -p /tmp/deploy
          cp -r public/. /tmp/deploy/
          echo "Copied files to /tmp/deploy"
          echo ""
          
          # Now switch branches and deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages
          
          # Clear old files
          rm -rf * .nojekyll .gitignore
          
          # Copy built files from temp location
          cp -r /tmp/deploy/. .
          echo "Deployment files copied to gh-pages branch"
          
          git add -A
          git commit -m "Deploy ${{ github.sha }}" || true
          git push origin gh-pages
