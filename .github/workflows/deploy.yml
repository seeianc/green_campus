name: Build and Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      
      - run: pnpm install
      
      - run: pnpm --filter @workspace/green-campus run build
        env:
          PORT: 3000
          BASE_PATH: /green_campus/
      
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: artifacts/green-campus/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: public
      
      - name: Deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages
          rm -rf * .nojekyll .gitignore
          cp -r public/* .
          git add -A
          git commit -m "Deploy ${{ github.sha }}" || true
          git push origin gh-pages
