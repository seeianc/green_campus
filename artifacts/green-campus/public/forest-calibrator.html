<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zone Calibrator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Space Grotesk', monospace, sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 300px; flex-shrink: 0; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
  #sidebar h2 { padding: 14px 16px; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; color: #58a6ff; border-bottom: 1px solid #30363d; }
  .s-section { padding: 10px 16px; border-bottom: 1px solid #30363d; }
  .s-label { font-size: 10px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  select { width: 100%; padding: 7px 10px; border-radius: 5px; font-size: 12px; font-family: inherit; cursor: pointer; background: #21262d; border: 1px solid #30363d; color: #e6edf3; margin-bottom: 6px; }
  .btn { display: block; width: 100%; border: 1px solid #30363d; background: #21262d; color: #e6edf3; padding: 7px 10px; border-radius: 5px; font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 6px; transition: all 0.1s; text-align: left; }
  .btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .btn.danger { border-color: #f85149; color: #f85149; }
  .btn.danger:hover { background: #3a1a1a; }
  .btn.primary { border-color: #7ee787; background: #1a3a22; color: #7ee787; }
  .btn.primary:hover { background: #1f4a2a; }
  #zone-preview { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 5px; border: 1px solid #30363d; background: #0d1117; margin-top: 6px; font-size: 12px; }
  #zone-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  #instructions { padding: 10px 16px; font-size: 11px; color: #7d8590; line-height: 1.7; border-bottom: 1px solid #30363d; }
  #instructions b { color: #e6edf3; }
  #poly-list-wrap { flex: 1; overflow-y: auto; padding: 10px 16px; border-bottom: 1px solid #30363d; min-height: 60px; }
  #output-wrap { display: flex; flex-direction: column; padding: 10px 16px; height: 200px; }
  #output-label { font-size: 10px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  #output { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 5px; padding: 8px; font-size: 10px; font-family: monospace; color: #7ee787; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  #canvas-wrap { flex: 1; overflow: hidden; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; cursor: crosshair; }
  #status { position: absolute; top: 10px; left: 10px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 5px; padding: 5px 12px; font-size: 11px; color: #7d8590; pointer-events: none; max-width: 400px; }
  #coords { position: absolute; bottom: 10px; left: 10px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 5px; padding: 4px 10px; font-size: 10px; color: #58a6ff; font-family: monospace; pointer-events: none; }
  .poly-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .poly-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .poly-name { font-size: 11px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .poly-del { font-size: 10px; color: #f85149; cursor: pointer; border: none; background: none; padding: 0 4px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>📐 Zone Calibrator</h2>

  <div class="s-section">
    <div class="s-label">Map</div>
    <select id="mapSelect">
      <option value="RLS" data-w="900" data-h="1274">RLS — Inland School</option>
      <option value="EDS" data-w="950" data-h="671">EDS — Penobscot Bay</option>
      <option value="CES" data-w="950" data-h="671">CES — River / Tidal</option>
      <option value="LCS" data-w="950" data-h="671">LCS — Coastal Forest</option>
      <option value="STG" data-w="900" data-h="1274">STG — Lakeside Campus</option>
    </select>
    <button class="btn" onclick="loadMap()">Load Map</button>
  </div>

  <div class="s-section">
    <div class="s-label">Zone Type</div>
    <select id="zoneType" onchange="updateZonePreview()">
      <option value="forest">🌲 Forest</option>
      <option value="field">🌾 Open Field</option>
      <option value="building">🏫 Building</option>
      <option value="parking">🅿 Parking</option>
      <option value="water">💧 Water / River</option>
      <option value="ocean">🌊 Ocean / Bay</option>
      <option value="tidal_zone">🌊 Tidal Zone</option>
      <option value="road">🛣 Road</option>
      <option value="contour_zone">⛰ Steep Terrain</option>
      <option value="nobuild">⛔ No-Build Zone</option>
      <option value="boundary">📍 Campus Boundary</option>
    </select>
    <div id="zone-preview">
      <div id="zone-swatch"></div>
      <span id="zone-label-text">Forest zone</span>
    </div>
    <div class="s-label" style="margin-top:8px">Optional label</div>
    <input id="zoneLabel" type="text" placeholder="e.g. Main Building, River..." style="width:100%;padding:6px 10px;border-radius:5px;background:#21262d;border:1px solid #30363d;color:#e6edf3;font-size:12px;font-family:inherit">
  </div>

  <div class="s-section">
    <div class="s-label">Drawing</div>
    <button class="btn primary" onclick="startPolygon()">+ New Zone Polygon</button>
    <button class="btn" onclick="closePolygon()">Close Polygon (Enter)</button>
    <button class="btn danger" onclick="undoPoint()">↩ Undo Last Point</button>
    <button class="btn danger" onclick="clearAll()">✕ Clear All</button>
  </div>

  <div class="s-label" style="padding:8px 16px 4px">Polygons</div>
  <div id="poly-list-wrap">
    <div id="polyList" style="font-size:11px;color:#7d8590">None yet</div>
  </div>

  <div id="instructions">
    <b>Click</b> to add points · <b>Enter</b> or double-click to close · <b>⌘Z</b> to undo
  </div>

  <div id="output-wrap">
    <div id="output-label">Output — paste into features array</div>
    <div id="output">// Draw and close polygons to generate output</div>
    <button class="btn" style="margin-top:6px" onclick="copyOutput()">📋 Copy to Clipboard</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="status">Select a map and click Load Map</div>
  <div id="coords">x: — y: —</div>
</div>

<script>
const ZONE_CONFIG = {
  forest:       { color: '#7ee787', fill: 'rgba(46,160,67,0.25)',   label: 'Forest zone' },
  field:        { color: '#a0dc50', fill: 'rgba(160,220,80,0.2)',   label: 'Open field' },
  building:     { color: '#dca850', fill: 'rgba(200,160,80,0.25)',  label: 'Building' },
  parking:      { color: '#a0a0c8', fill: 'rgba(130,130,180,0.25)', label: 'Parking' },
  water:        { color: '#39c8e8', fill: 'rgba(30,100,160,0.25)',  label: 'Water / River' },
  ocean:        { color: '#1478cc', fill: 'rgba(20,70,140,0.25)',   label: 'Ocean / Bay' },
  tidal_zone:   { color: '#00c8aa', fill: 'rgba(0,200,170,0.25)',   label: 'Tidal zone' },
  road:         { color: '#c8c8a0', fill: 'rgba(200,200,160,0.3)',  label: 'Road' },
  contour_zone: { color: '#d29922', fill: 'rgba(210,153,34,0.2)',   label: 'Steep terrain' },
  nobuild:      { color: '#f85149', fill: 'rgba(248,81,73,0.25)',   label: 'No-build zone' },
  boundary:     { color: '#ff8c8c', fill: 'rgba(255,140,140,0.1)',  label: 'Campus boundary' },
};

let mapW = 900, mapH = 1274, mapId = 'RLS';
let polygons = [];
let active = null;
let imgLoaded = false;
let img = new Image();
let canvasScale = 1;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const coordsEl = document.getElementById('coords');

function updateZonePreview() {
  const type = document.getElementById('zoneType').value;
  const cfg = ZONE_CONFIG[type];
  document.getElementById('zone-swatch').style.background = cfg.fill;
  document.getElementById('zone-swatch').style.border = `1px solid ${cfg.color}`;
  document.getElementById('zone-label-text').textContent = cfg.label;
}
updateZonePreview();

function loadMap() {
  const sel = document.getElementById('mapSelect');
  const opt = sel.options[sel.selectedIndex];
  mapW = parseInt(opt.dataset.w);
  mapH = parseInt(opt.dataset.h);
  mapId = sel.value;
  imgLoaded = false;
  img = new Image();
  img.onload = () => { imgLoaded = true; resizeCanvas(); redraw(); statusEl.textContent = `${mapId} loaded (${mapW}×${mapH}) — select zone type and click "New Zone Polygon"`; };
  img.onerror = () => { statusEl.textContent = 'Error loading image'; };
  img.src = `maps/${mapId}.png`;
  polygons = []; active = null;
  updatePolyList(); updateOutput();
}

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = wrap.clientWidth - 20, maxH = wrap.clientHeight - 20;
  canvasScale = Math.min(maxW / mapW, maxH / mapH);
  canvas.width = Math.round(mapW * canvasScale);
  canvas.height = Math.round(mapH * canvasScale);
}
window.addEventListener('resize', () => { if (imgLoaded) { resizeCanvas(); redraw(); } });

function toCanvas(mx, my) { return [mx * canvasScale, my * canvasScale]; }
function toMap(cx, cy) { return [cx / canvasScale, cy / canvasScale]; }

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (imgLoaded) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  polygons.forEach((poly) => {
    if (poly.points.length === 0) return;
    const cfg = ZONE_CONFIG[poly.type] || ZONE_CONFIG.forest;
    ctx.save();
    ctx.beginPath();
    const [x0, y0] = toCanvas(...poly.points[0]);
    ctx.moveTo(x0, y0);
    poly.points.slice(1).forEach(p => { const [x, y] = toCanvas(...p); ctx.lineTo(x, y); });
    if (poly.closed) ctx.closePath();
    ctx.fillStyle = cfg.fill;
    ctx.fill();
    ctx.strokeStyle = cfg.color;
    ctx.lineWidth = 2;
    ctx.setLineDash(poly.closed ? [] : [6, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
    poly.points.forEach(([mx, my], j) => {
      const [cx, cy] = toCanvas(mx, my);
      ctx.fillStyle = cfg.color;
      ctx.beginPath(); ctx.arc(cx, cy, j === 0 ? 5 : 3, 0, Math.PI * 2); ctx.fill();
      if (j === 0) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2); ctx.stroke(); }
    });
    if (poly.closed && poly.label) {
      const cx = poly.points.reduce((s, p) => s + p[0], 0) / poly.points.length;
      const cy = poly.points.reduce((s, p) => s + p[1], 0) / poly.points.length;
      const [scx, scy] = toCanvas(cx, cy);
      ctx.fillStyle = cfg.color;
      ctx.font = 'bold 11px Space Grotesk,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(poly.label, scx, scy);
      ctx.textAlign = 'left';
    }
    ctx.restore();
  });
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const [mx, my] = toMap(e.clientX - r.left, e.clientY - r.top);
  coordsEl.textContent = `x: ${Math.round(mx)}  y: ${Math.round(my)}`;
  if (active !== null && !polygons[active].closed && polygons[active].points.length > 0) {
    redraw();
    const last = polygons[active].points[polygons[active].points.length - 1];
    const [lx, ly] = toCanvas(...last);
    const [cx, cy] = toCanvas(mx, my);
    const cfg = ZONE_CONFIG[polygons[active].type] || ZONE_CONFIG.forest;
    ctx.strokeStyle = cfg.color + '88';
    ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(cx, cy); ctx.stroke();
    ctx.setLineDash([]);
  }
});

canvas.addEventListener('click', e => {
  if (active === null || polygons[active].closed) return;
  const r = canvas.getBoundingClientRect();
  const [mx, my] = toMap(e.clientX - r.left, e.clientY - r.top);
  const pt = [Math.round(mx), Math.round(my)];
  const poly = polygons[active];
  if (poly.points.length >= 3) {
    const [sx, sy] = toCanvas(...poly.points[0]);
    const [cx, cy] = toCanvas(mx, my);
    if (Math.hypot(cx - sx, cy - sy) < 12) { closePolygon(); return; }
  }
  poly.points.push(pt);
  redraw(); updateOutput();
});

canvas.addEventListener('dblclick', () => closePolygon());

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') closePolygon();
  if (e.key === 'Escape') { active = null; statusEl.textContent = 'Drawing cancelled'; }
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undoPoint(); }
});

function startPolygon() {
  if (!imgLoaded) { alert('Load a map first'); return; }
  if (active !== null && !polygons[active].closed && polygons[active].points.length > 0) {
    if (!confirm('Close current polygon first?')) return;
    closePolygon();
  }
  const type = document.getElementById('zoneType').value;
  const label = document.getElementById('zoneLabel').value.trim();
  polygons.push({ type, label, points: [], closed: false });
  active = polygons.length - 1;
  statusEl.textContent = `Drawing ${type} polygon — click to add points, Enter or double-click to close`;
  updatePolyList();
}

function closePolygon() {
  if (active === null) return;
  const poly = polygons[active];
  const minPts = poly.type === 'road' ? 2 : 3;
  if (poly.points.length < minPts) { alert(`Need at least ${minPts} points`); return; }
  poly.closed = true; active = null;
  redraw(); updatePolyList(); updateOutput();
  statusEl.textContent = 'Polygon closed. Click "New Zone Polygon" to add another.';
}

function undoPoint() {
  if (active === null) return;
  polygons[active].points.pop();
  redraw(); updateOutput();
}

function clearAll() {
  if (!confirm('Clear all polygons?')) return;
  polygons = []; active = null;
  redraw(); updatePolyList(); updateOutput();
}

function updatePolyList() {
  const el = document.getElementById('polyList');
  if (polygons.length === 0) { el.innerHTML = '<span style="color:#7d8590">None yet</span>'; return; }
  el.innerHTML = polygons.map((p, i) => {
    const cfg = ZONE_CONFIG[p.type] || ZONE_CONFIG.forest;
    return `<div class="poly-row">
      <div class="poly-swatch" style="background:${cfg.fill};border:1px solid ${cfg.color}"></div>
      <span class="poly-name">${p.type}${p.label ? ' — ' + p.label : ''} (${p.points.length}pt${p.closed ? ' ✓' : '…'})</span>
      <button class="poly-del" onclick="deletePoly(${i})">✕</button>
    </div>`;
  }).join('');
}

function deletePoly(i) {
  polygons.splice(i, 1);
  if (active === i) active = null;
  else if (active > i) active--;
  redraw(); updatePolyList(); updateOutput();
}

function updateOutput() {
  const closed = polygons.filter(p => p.closed);
  if (closed.length === 0) { document.getElementById('output').textContent = '// Draw and close polygons to generate output'; return; }
  const lines = closed.map(p => {
    const pts = `points:[${p.points.map(([x,y]) => `[${x},${y}]`).join(',')}]`;
    const label = p.label ? `, label:'${p.label}'` : '';
    return `{ type:'${p.type}', ${pts}${label} },`;
  });
  document.getElementById('output').textContent = lines.join('\n');
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('#output-wrap .btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy to Clipboard', 2000);
  });
}

window.addEventListener('load', loadMap);
</script>
</body>
</html>
