kind = "web"
previewPath = "/"
title = "Green Campus Tools"
version = "1.0.0"
id = "artifacts/green-campus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19921

[services.development]
run = "pnpm --filter @workspace/green-campus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/green-campus", "run", "build" ]
publicDir = "artifacts/green-campus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19921"
BASE_PATH = "/"
